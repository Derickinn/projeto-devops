name: CI

on:
  push:
    branches: [ "main", "nova-feature" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Instalar dependências
      run: pip install -r requirements.txt

    - name: Rodar testes
      run: pytest

  message:
    runs-on: ubuntu-latest
    steps:
    - name: Enviar mensagem para Discord
      run: |
        curl -H "Content-Type: application/json" \
        -d "{
          \"content\": \"🚀 Novo commit!\n👤 Autor: ${{ github.actor }}\n📌 Mensagem:Deu certo! \"
        }" \
        ${{ secrets.DISCORD }}