name: CI

on:
  push:
    branches: [ "main", "nova-feature" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Teste simples
        run: echo "CI funcionando!"

  message:
    runs-on: ubuntu-latest
    steps:
    - name: Enviar mensagem para Discord
      run: |
        curl -H "Content-Type: application/json" \
        -d "{
          \"content\": \"🚀 Novo commit!\n👤 Autor: ${{ github.actor }}\n📌 Mensagem: ${{ github.event.head_commit.message }}\n🌿 Branch: ${{ github.ref }}\"
        }" \
        ${{ secrets.DISCORD }}